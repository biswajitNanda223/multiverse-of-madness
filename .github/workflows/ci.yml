name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Imports sorting (Isort)
        run: python -m isort --check-only .

      - name: Verify Formatting (Black)
        run: python -m black --check --line-length=100 .

      - name: Run Flake8 Linter
        run: python -m flake8 --max-line-length=100 --extend-ignore=E203 .

      - name: Run Mypy Static Type Checking
        run: python -m mypy --ignore-missing-imports --disallow-untyped-defs --explicit-package-bases .

      - name: Run Pytest Suite
        run: python -m pytest --import-mode=importlib patterns/ projects/ tools/
